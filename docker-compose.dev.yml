services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kubewise:kubewise@postgres:5432/kubewise
      DATABASE_URL_SYNC: postgresql://kubewise:kubewise@postgres:5432/kubewise
      MOCK_MODE: ${MOCK_MODE:-true}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://localhost:9090}
      ENABLE_METRICS_SCHEDULER: ${ENABLE_METRICS_SCHEDULER:-false}
      METRICS_COLLECTION_INTERVAL_MINUTES: ${METRICS_COLLECTION_INTERVAL_MINUTES:-15}
      METRICS_COLLECTION_SCENARIO: ${METRICS_COLLECTION_SCENARIO:-wasteful}
      ENABLE_DB_PERSISTENCE: ${ENABLE_DB_PERSISTENCE:-true}
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=kubewise
      - POSTGRES_PASSWORD=kubewise
      - POSTGRES_DB=kubewise
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubewise"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
